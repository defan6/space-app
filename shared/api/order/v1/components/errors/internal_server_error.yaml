internal_server_error:
  description: Internal Server Error
  content:
    application/json:
      schema:
        type: object
        properties:
          message:
            type: string
            description: A description of error
            example: "An unexpected error occurred. Please try again later"
          error_code:
            type: string
            description: A code that represents the specific error
            example: "SERVER_ERROR_001"
          required:
            - message
            - error_code