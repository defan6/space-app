conflict_error:
  description: Conflict Error
  content:
    application/json:
      schema:
        type: object
        properties:
          message:
            type: string
            description: A description of error
            example: "Not enough parts on inventory"
          error_code:
            type: string
            description: A code that represents the specific error
            example: "SERVER_ERROR_001"
          required:
            - message
            - error_code