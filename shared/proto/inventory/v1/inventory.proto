syntax = "proto3";


package inventory.v1;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "validate/validate.proto";

option go_package = "github.com/defan6/space-app/shared/pkg/proto/inventory/v1;inventory_v1";

service InventoryService {
  rpc GetPart(GetPartRequest) returns (GetPartResponse) {
    option (google.api.http) = {
      get: "/api/v1/inventory/search/{uuid}"
    };
  }
  rpc GetParts(GetPartsRequest) returns (GetPartsResponse){
    option (google.api.http) = {
      post: "/api/v1/inventory/search"
      body: "*"
    };
  }
  rpc CreatePart(CreatePartRequest) returns (CreatePartResponse){
    option (google.api.http) = {
      post: "/api/v1/inventory"
      body: "*"
    };
  }
}

// GetPartRequest represents a request to GetPart
message GetPartRequest {
  string uuid = 1 [(validate.rules).string.uuid = true];
}

// CreatePartRequest represents a request to CreatePart
message CreatePartRequest {
  string name = 2 [(validate.rules).string = {min_len: 3, max_len: 30}];
  string description = 3 [(validate.rules).string.max_len = 500];
  double price = 4 [(validate.rules).double.gt = 0];
  int64 stock_quantity = 5 [(validate.rules).int64.gte = 0];
  Category category = 6 [(validate.rules).enum = {defined_only: true, not_in: [0]}];
  Dimensions dimensions = 7 [(validate.rules).message.required = true];
  Manufacturer manufacturer = 8 [(validate.rules).message.required = true];
  repeated string tags = 9 [(validate.rules).repeated = {max_items: 10, items: {string: {min_len: 2, max_len: 20}}}];
  map<string, Value> metadata = 10 [(validate.rules).map.max_pairs = 20];
}

// CreatePartResponse represents a request to CreatePart
message CreatePartResponse {
  string uuid = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int64 stock_quantity = 5;
  Category category = 6;
  Dimensions dimensions = 7;
  Manufacturer manufacturer = 8;
  repeated string tags = 9;
  map<string, Value> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
}

// GetPartsRequest represents a request to GetParts
message GetPartsRequest {
  PartsFilter parts_filter = 1 [(validate.rules).message.required = true];
}

// GetPartResponse represents a response to GetPart
message GetPartResponse {
  string uuid = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int64 stock_quantity = 5;
  Category category = 6;
  Dimensions dimensions = 7;
  Manufacturer manufacturer = 8;
  repeated string tags = 9;
  map<string, Value> metadata = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

// GetPartsResponse represents a response to GetParts
message GetPartsResponse {
  repeated GetPartResponse get_parts_response = 1;
}

// PartsFilter represents a filter of parts
message PartsFilter {
  repeated string uuids = 1 [(validate.rules).repeated = {
    max_items: 100,
    items: {string: {uuid: true}}
  }];

  repeated string names = 2 [(validate.rules).repeated = {
    max_items: 50,
    items: {string: {min_len: 1, max_len: 30}}
  }];

  repeated Category categories = 3 [(validate.rules).repeated = {
    max_items: 10,
    items: {enum: {defined_only: true}}
  }];

  repeated string manufacturer_countries = 4 [(validate.rules).repeated = {
    max_items: 20,
    items: {string: {len: 2}}
  }];

  repeated string tags = 5 [(validate.rules).repeated = {
    max_items: 20,
    items: {string: {min_len: 2, max_len: 20}}
  }];
}

// Category represents a enum of categories
enum Category {
  CATEGORY_UNKNOWN = 0;
  CATEGORY_ENGINE = 1;
  CATEGORY_FUEL = 2;
  CATEGORY_PORTHOLE = 3;
  CATEGORY_WING = 4;
}

// Dimensions represents a dimensions of part
message Dimensions {
  double length = 1 [(validate.rules).double.gt = 0];
  double width = 2  [(validate.rules).double.gt = 0];
  double height = 3 [(validate.rules).double.gt = 0];
  double weight = 4 [(validate.rules).double.gt = 0];
}

// Manufacturer represents a manufacturer of part
message Manufacturer {
  string name = 1 [(validate.rules).string = {min_len: 2, max_len: 30}];
  string country = 2 [(validate.rules).string = {min_len: 2,  max_len: 30}];
  string website = 3 [(validate.rules).string.uri = true];
}

// Value represents a metadata value of part
message Value {
  string string_value = 1;
  int64 int64_value = 2;
  double double_value = 3;
  bool bool_value = 4;
}