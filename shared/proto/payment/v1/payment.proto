syntax = "proto3";


package payment.v1;

option go_package = "github.com/defan6/space-app/shared/pkg/proto/payment/v1;payment_v1";
import "google/api/annotations.proto";



service PaymentService {
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse) {
    option (google.api.http) = {
      post: "/api/v1/payments"
      body: "*"
    };
  }
}

// PayOrderRequest represents a request for pay order
message PayOrderRequest {
  string order_uuid = 1;
  string user_uuid = 2;
  PaymentMethod payment_method = 3;
}

// PayOrderResponse represents a response for pay order
message PayOrderResponse {
  string transaction_uuid = 1;
}

// PaymentMethod represents a enum of payment methods
enum PaymentMethod {
  PAYMENT_METHOD_UNKNOWN = 0;
  PAYMENT_METHOD_CARD = 1;
  PAYMENT_METHOD_SBP = 2;
  PAYMENT_METHOD_CREDIT_CARD = 3;
  PAYMENT_METHOD_INVESTOR_MONEY = 4;
}